# --- General options --- #

url: "https://fawadmsee20.github.io"
baseurl: ""

# Name of website
title: Fawad Khan

# Short description of your site
description: AI Researcher | Wireless Power Transfer | Machine Learning | Energy Systems

# --- Navigation bar options --- #

navbar-links:
  About Me: "aboutme"
  Research:
    - Interests: "researchinterest"
    - Publications: "publication"
    - Projects: "projects"
  Portfolio: "projects"
  Contact: "contactnew"

# Profile image
avatar: "/_data/fawad-new2.jpg"

# --- Colors & Design --- #

navbar-col: "#0f172a"
navbar-text-col: "#FFFFFF"
navbar-children-col: "#1d4ed8"
page-col: "#FFFFFF"
link-col: "#2563eb"
hover-col: "#1d4ed8"
footer-col: "#0f172a"
footer-text-col: "#FFFFFF"
footer-link-col: "#60a5fa"

# Optional background image
footer-img: "/img/nebula.jpg"

# --- Footer options --- #

author:
  name: Fawad Khan

# --- Social Links --- #
social-network-links:
  email: "your-email@example.com"   # ⚠️ UPDATE THIS
  github: fawadmsee20
  linkedin: "your-linkedin-username"  # ⚠️ UPDATE THIS
  # google-scholar: ""  # (optional)
  # orcid: ""           # (optional)

# --- Share buttons --- #
share-links-active:
  twitter: false
  facebook: false
  linkedin: true

# --- Pretty URL --- #
url-pretty: "fawadmsee20.github.io"

# --- Analytics (optional) --- #
# google_analytics: ""

# --- Misc --- #

excerpt_length: 50
title-separator: "-"

# --- Technical (DO NOT TOUCH MUCH) --- #

timezone: "Asia/Seoul"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: false
  -
    scope:
      path: ""
    values:
      layout: "page"
      show-avatar: true

link-tags: true

exclude:
  - CHANGELOG.md
  - CNAME
  - Dockerfile
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - Vagrantfile

plugins:
  - jekyll-paginate
  - jekyll-sitemap
